<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LoanLedger">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" id="manifestLink">
<link rel="icon" id="faviconLink">
<link rel="apple-touch-icon" id="appleIconLink">
<title>LoanLedger</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b24;--surface2:#1e2535;--surface3:#252d40;--border:#2d3550;--accent:#4f8ef7;--accent2:#7c6af7;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--text:#e8eaf0;--text2:#8b90a7;--text3:#4a506a;--radius:16px;--radius-sm:10px;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:Sora,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
.logo{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.sync-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3)}.sdot.ok{background:var(--green)}.sdot.busy{background:var(--yellow);animation:pulse 1s infinite}.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{display:none}
.page{display:none}.page.active{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.container{padding:16px;max-width:700px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::before{background:var(--accent)}.stat-card.purple::before{background:var(--accent2)}.stat-card.green::before{background:var(--green)}.stat-card.yellow::before{background:var(--yellow)}
.stat-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:19px;font-weight:700;margin-top:4px;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:15px;font-weight:600}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px 10px 38px;color:var(--text);font-family:Sora,sans-serif;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}.search-wrap input::placeholder{color:var(--text3)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}
.cards-grid{display:flex;flex-direction:column;gap:10px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s}
.ccard:active{transform:scale(.98)}.ccard.overdue{border-color:rgba(245,158,11,.4)}.ccard.frozen{border-color:rgba(120,120,160,.3);opacity:.85}
.ccard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ccard-left{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.avatar.frozen-av{background:linear-gradient(135deg,#3a3f55,#4a5070)}
.cname{font-weight:600;font-size:14px}.cphone{font-size:11px;color:var(--text2);margin-top:1px}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-active{background:rgba(34,197,94,.15);color:var(--green)}.b-closed{background:rgba(100,100,140,.15);color:var(--text3);border:1px solid rgba(100,100,140,.3)}.b-overdue{background:rgba(245,158,11,.15);color:var(--yellow)}
.pbar{background:var(--surface3);border-radius:4px;height:4px;overflow:hidden;margin:8px 0 4px}
.pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pct-label{font-size:10px;color:var(--text3)}
.cmeta{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ml{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.mv{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:2px}
.mv.r{color:var(--red)}.mv.g{color:var(--green)}.mv.dim{color:var(--text3)}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}.empty-title{font-size:14px;font-weight:600;color:var(--text2)}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border:none;background:none;color:var(--text3);font-family:Sora,sans-serif;font-size:10px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--accent)}.nav-icon{font-size:20px;line-height:1}
.fab{position:fixed;bottom:calc(72px + var(--safe-bottom));right:16px;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,142,247,.4);z-index:40}
.fab:active{transform:scale(.92)}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;color:var(--text2);font-size:13px;cursor:pointer;font-family:Sora,sans-serif;display:inline-flex;align-items:center;gap:5px}
/* Frozen banner */
.frozen-banner{background:rgba(80,80,120,.15);border:1px solid rgba(100,100,160,.3);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.frozen-icon{font-size:22px;flex-shrink:0}
.frozen-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px}
.frozen-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.frozen-lbl{color:var(--text3)}.frozen-val{font-family:'JetBrains Mono',monospace;font-weight:700}
.frozen-val.r{color:var(--red)}.frozen-val.g{color:var(--green)}.frozen-val.dim{color:var(--text3)}
.dhead{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.dtop{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.davatar{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.davatar.frozen-av{background:linear-gradient(135deg,#3a3f55,#4a5070)}
.dname{font-size:18px;font-weight:700}.dphone{font-size:13px;color:var(--text2);margin-top:2px}.dnotes{font-size:11px;color:var(--text3);margin-top:4px}
.dactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.dstats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ds{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}
.dsl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.dsv{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:80px}
.twrap-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:var(--surface2)}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;white-space:nowrap}
td{padding:8px 12px;font-size:11px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.tdl{font-family:Sora,sans-serif;color:var(--text2);font-size:11px}
/* Row states */
.row-paid{cursor:pointer}.row-paid:active{background:rgba(34,197,94,.05)!important}
.row-paid td.tdl:first-child{color:var(--accent);font-weight:700}
.row-unpaid{cursor:pointer}.row-unpaid:active{background:rgba(79,142,247,.06)!important}
.row-closing{background:rgba(80,80,120,.08);cursor:default}
.row-entry{cursor:pointer;background:rgba(79,142,247,.03)}.row-entry:active{background:rgba(79,142,247,.08)!important}
/* Tags */
.tag{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;font-family:Sora,sans-serif;white-space:nowrap}
.tp{background:rgba(34,197,94,.15);color:var(--green)}
.tpp{background:rgba(79,142,247,.15);color:var(--accent)}
.ti{background:rgba(124,106,247,.15);color:var(--accent2)}
.tt{background:rgba(245,158,11,.15);color:var(--yellow)}
.tu{background:rgba(239,68,68,.1);color:var(--red)}
.tc{background:rgba(100,100,140,.12);color:var(--text3);border:1px solid rgba(100,100,140,.2)}
/* entry sub-row */
.entry-row td{padding:5px 12px;font-size:10px;background:rgba(79,142,247,.03);border-bottom:1px solid rgba(45,53,80,.5)}
.entry-row .entry-badge{font-size:9px;color:var(--text3);font-family:Sora,sans-serif}
/* Modal */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);padding-bottom:var(--safe-bottom)}
.backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}.fl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text);font-family:Sora,sans-serif;font-size:14px;outline:none}
.fi:focus{border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;gap:8px;margin-top:16px}.mact .btn{flex:1}
.btn{padding:11px 16px;border-radius:var(--radius-sm);border:none;font-family:Sora,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.wa-btn{background:#25d366;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Sora,sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.pay-tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:Sora,sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .2s}
.pay-tab.active{background:var(--accent);color:#fff}
.lump-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.lump-row:last-child{border-bottom:none}
.lump-lbl{font-size:11px;color:var(--text2)}.lump-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.lump-val.g{color:var(--green)}.lump-val.r{color:var(--red)}.lump-val.y{color:var(--yellow)}
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-weight:500;z-index:500;display:none;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{display:flex}.toast.success{border-color:rgba(34,197,94,.4)}.toast.error{border-color:rgba(239,68,68,.4)}
.sum-section{margin-bottom:20px}.sum-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sum-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer}
.sum-name{font-size:13px;font-weight:600}.sum-due{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--red)}.sum-ok{color:var(--green)}
.asheet-info{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px}
.asheet-month{font-size:15px;font-weight:700;margin-bottom:8px}
.asheet-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.asheet-row:last-child{border-bottom:none}
.asheet-lbl{color:var(--text2)}.asheet-val{font-family:'JetBrains Mono',monospace;font-weight:600}
.asheet-actions{display:flex;flex-direction:column;gap:8px}
.asheet-btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;font-family:Sora,sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.asheet-btn:active{transform:scale(.98)}
.asheet-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.asheet-delete{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.asheet-cancel{background:none;color:var(--text3);border:1px solid var(--border)}
@media(min-width:600px){
  .cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .backdrop{align-items:center;padding-bottom:0}.modal{border-radius:20px;padding:24px;max-height:80dvh}
  .fab{bottom:calc(80px + var(--safe-bottom));right:24px}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header class="header">
  <div class="logo"><div class="logo-icon">&#8377;</div>LoanLedger</div>
  <div class="sync-pill"><div class="sdot ok" id="sdot"></div><span id="stxt">Ready</span></div>
</header>
<div class="scroll-area" id="scrollArea">
  <div class="page active" id="page-dash">
    <div class="container">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="sec-head">
        <div class="sec-title">Customers <span class="chip" id="cCount">0</span></div>
        <button class="btn btn-secondary btn-sm" onclick="renderDash()">&#8635; Refresh</button>
      </div>
      <div class="search-wrap">
        <span class="search-ico">&#128269;</span>
        <input type="text" placeholder="Search name or phone..." oninput="renderCards(this.value)">
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div style="height:80px"></div>
    </div>
  </div>
  <div class="page" id="page-detail">
    <div class="container">
      <div class="back-row"><button class="back-btn" onclick="goBack()">&#8592; Back</button></div>
      <div id="detailContent"></div>
    </div>
  </div>
  <div class="page" id="page-summary">
    <div class="container">
      <div class="sec-head" style="margin-bottom:16px"><div class="sec-title">&#128202; Summary</div></div>
      <div id="summaryContent"></div>
      <div style="height:80px"></div>
    </div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-dash" onclick="showPage('dash')"><span class="nav-icon">&#127968;</span>Home</button>
  <button class="nav-btn" id="nav-summary" onclick="showPage('summary')"><span class="nav-icon">&#128202;</span>Summary</button>
</nav>
<button class="fab" onclick="openAddModal()" id="fabBtn">+</button>

<!-- ADD -->
<div class="backdrop" id="mAdd"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">&#10133; Add Customer</div>
  <div class="fg"><label class="fl">Full Name *</label><input class="fi" id="c_name" placeholder="e.g. Ravi Kumar"></div>
  <div class="fg"><label class="fl">Phone</label><input class="fi" id="c_phone" type="tel" placeholder="9876543210"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Principal (&#8377;) *</label><input class="fi" id="c_prin" type="number" placeholder="50000"></div>
    <div class="fg"><label class="fl">Rate (%/month) *</label><input class="fi" id="c_rate" type="number" step="0.01" placeholder="2"></div>
  </div>
  <div class="fg"><label class="fl">Start Date *</label><input class="fi" id="c_date" type="date"></div>
  <div class="fg"><label class="fl">Notes</label><input class="fi" id="c_notes" placeholder="Optional notes"></div>
  <div class="mact">
    <button class="btn btn-secondary" onclick="closeM('mAdd')">Cancel</button>
    <button class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
  </div>
</div></div>

<!-- EDIT -->
<div class="backdrop" id="mEdit"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">&#9999;&#65039; Edit Customer</div>
  <div class="fg"><label class="fl">Full Name *</label><input class="fi" id="e_name"></div>
  <div class="fg"><label class="fl">Phone</label><input class="fi" id="e_phone" type="tel"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Principal (&#8377;) *</label><input class="fi" id="e_prin" type="number"></div>
    <div class="fg"><label class="fl">Rate (%/month) *</label><input class="fi" id="e_rate" type="number" step="0.01"></div>
  </div>
  <div class="fg"><label class="fl">Start Date *</label><input class="fi" id="e_date" type="date"></div>
  <div class="fg"><label class="fl">Notes</label><input class="fi" id="e_notes"></div>
  <div class="mact">
    <button class="btn btn-danger" onclick="delCustomer()">&#128465; Delete</button>
    <button class="btn btn-secondary" onclick="closeM('mEdit')">Cancel</button>
    <button class="btn btn-primary" onclick="saveEdit()">Save</button>
  </div>
</div></div>

<!-- PAYMENT -->
<div class="backdrop" id="mPay"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">&#128179; Record Payment</div>
  <div class="frow">
    <div class="fg"><label class="fl">Payment Month *</label><input class="fi" id="p_month" type="month"></div>
    <div class="fg"><label class="fl">Payment Date *</label><input class="fi" id="p_date" type="date"></div>
  </div>
  <div style="display:flex;gap:0;margin-bottom:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px">
    <button class="pay-tab active" id="tab-split" onclick="setPayMode('split')">&#9999;&#65039; Split Entry</button>
    <button class="pay-tab" id="tab-lump" onclick="setPayMode('lump')">&#128176; Lump Sum</button>
  </div>
  <div id="mode-split">
    <div class="frow">
      <div class="fg"><label class="fl">Principal Paid (&#8377;)</label><input class="fi" id="p_prin" type="number" min="0" placeholder="0" oninput="updateSplitPreview()"></div>
      <div class="fg"><label class="fl">Interest Paid (&#8377;)</label><input class="fi" id="p_int" type="number" min="0" placeholder="0" oninput="updateSplitPreview()"></div>
    </div>

// ── STORAGE ──

function save(){try{localStorage.setItem('ll_data',JSON.stringify(customers));}catch(e){}}
function load(){try{const d=localStorage.getItem('ll_data');if(d){const p=JSON.parse(d);if(p&&p.length>0)return p;}}catch(e){}return null;}
function isSeeded(){try{return localStorage.getItem('ll_seeded')==='1';}catch(e){return false;}}

// Custom confirm — works reliably in standalone/PWA mode where window.confirm() silently fails
function customConfirm(message,title){
  return new Promise(resolve=>{
    document.getElementById('confirmTitle').textContent=title||'\u26A0\uFE0F Confirm';
    document.getElementById('confirmMsg').textContent=message;
    const okBtn=document.getElementById('confirmOkBtn');
    const cancelBtn=document.getElementById('confirmCancelBtn');
    const cleanup=(result)=>{
      okBtn.onclick=null;cancelBtn.onclick=null;
      closeM('mConfirm');
      resolve(result);
    };
    okBtn.onclick=()=>cleanup(true);
    cancelBtn.onclick=()=>cleanup(false);
    openM('mConfirm');
  });
}

function init(){
  const cached=load();
  if(cached){
    customers=cached;
    // Migrate: give ids to any old payment entries that lack them
    let dirty=false;
    customers.forEach(c=>{
      (c.payments||[]).forEach(p=>{
        if(!p.id){p.id=genId();dirty=true;}
      });
    });
    if(dirty)save();
    markSeeded();
  }
  else if(!isSeeded()){customers=JSON.parse(JSON.stringify(SEED));save();markSeeded();}
  else{customers=[];save();}
  renderDash();setSS('ok','Ready');
}

// ── CALC ──
// payments is now an ARRAY of entries per customer.
// Each entry: {id, month, interestPaid, principalPaid, paymentDate, remarks, isClosing, waivedPrincipal, waivedInterest}
// Multiple entries can exist for the same month (different dates).
function calc(c){
  const start=new Date(c.startDate),now=new Date();
  let principal=c.principal,tia=0,tip=0;
  const allPays=c.payments||[];
  const closingEntry=allPays.find(p=>p.isClosing);

  // Group non-closing payments by month — sum them up
  const pmap={}; // month -> {totalIP, totalPP, entries:[]}
  allPays.forEach(p=>{
    if(p.isClosing)return;
    if(!pmap[p.month])pmap[p.month]={totalIP:0,totalPP:0,entries:[]};
    pmap[p.month].totalIP+=parseFloat(p.interestPaid||0);
    pmap[p.month].totalPP+=parseFloat(p.principalPaid||0);
    pmap[p.month].entries.push(p);
  });

  const rows=[];
  const renderedMonths=new Set();
  let y=start.getFullYear(),m=start.getMonth();

  while(principal>0){
    if(y>now.getFullYear()||(y===now.getFullYear()&&m>now.getMonth()))break;
    const mk=y+'-'+String(m+1).padStart(2,'0');
    if(closingEntry&&mk===closingEntry.month)break;
    renderedMonths.add(mk);
    const interest=parseFloat((principal*c.rate/100).toFixed(2));tia+=interest;
    const pm=pmap[mk]||{totalIP:0,totalPP:0,entries:[]};
    const ip=parseFloat(pm.totalIP.toFixed(2));
    const pp=parseFloat(pm.totalPP.toFixed(2));
    tip+=ip;
    const prev=principal;principal=Math.max(0,principal-pp);
    // Status logic
    let st;
    if(ip===0&&pp===0)st='unpaid';
    else if(pp>0&&ip===0)st='prin_paid';
    else if(pp===0&&ip>0&&ip<interest)st='int_partial';
    else if(pp===0&&ip>=interest)st='int_paid';
    else if(pp>0&&ip>0&&ip<interest)st='partial';
    else st='paid'; // both paid
    rows.push({mk,label:new Date(y,m).toLocaleString('default',{month:'short',year:'numeric'}),
      op:prev,mi:interest,ip,pp,cp:principal,st,entries:pm.entries,isClosing:false});
    m++;if(m>11){m=0;y++;}
  }

  // Closing row
  if(closingEntry){
    const parts=closingEntry.month.split('-');
    const label=new Date(parseInt(parts[0]),parseInt(parts[1])-1).toLocaleString('default',{month:'short',year:'numeric'});
    const wP=closingEntry.waivedPrincipal!=null?closingEntry.waivedPrincipal:principal;
    const wI=closingEntry.waivedInterest!=null?closingEntry.waivedInterest:parseFloat(Math.max(0,tia-tip).toFixed(2));
    rows.push({mk:closingEntry.month,label,op:principal,mi:0,ip:0,pp:0,cp:0,
      st:'closed',entries:[],isClosing:true,wP,wI,closeDate:closingEntry.paymentDate||''});
    principal=0;
  }

  // Extra payment entries outside loop (after principal=0)
  allPays.forEach(p=>{
    if(p.isClosing||renderedMonths.has(p.month))return;
    const ip2=parseFloat(p.interestPaid||0),pp2=parseFloat(p.principalPaid||0);
    if(ip2===0&&pp2===0)return;
    if(!pmap[p.month]){
      tip+=ip2;
      const parts=p.month.split('-');
      const label=new Date(parseInt(parts[0]),parseInt(parts[1])-1).toLocaleString('default',{month:'short',year:'numeric'});
      const pm2=pmap[p.month]||{totalIP:ip2,totalPP:pp2,entries:[p]};
      rows.push({mk:p.month,label,op:0,mi:0,ip:pm2.totalIP,pp:pm2.totalPP,cp:0,
        st:'paid',entries:pm2.entries,isClosing:false});
      renderedMonths.add(p.month);
    }
  });

  rows.sort((a,b)=>a.mk.localeCompare(b.mk));
  const ri=closingEntry?0:+Math.max(0,tia-tip).toFixed(2);
  return{rows,tia:+tia.toFixed(2),tip:+tip.toFixed(2),ri,rp:+principal.toFixed(2),mo:rows.length,isClosed:!!closingEntry,wP:closingEntry?closingEntry.waivedPrincipal:0,wI:closingEntry?closingEntry.waivedInterest:0};
}

function fmt(n){return'\u20B9'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2})}
function fmtD(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—'}
function genId(){return 'e_'+Date.now()+'_'+Math.floor(Math.random()*9999);}

// ── STATUS TAG ──
function stTag(st){
  switch(st){
    case 'paid':     return '<span class="tag tp">&#10003; Both Paid</span>';
    case 'int_paid': return '<span class="tag ti">&#10003; Int Paid</span>';
    case 'prin_paid':return '<span class="tag tpp">&#10003; Prin Paid</span>';
    case 'int_partial':return '<span class="tag tt">~ Int Partial</span>';
    case 'partial':  return '<span class="tag tt">~ Partial</span>';
    case 'unpaid':   return '<span class="tag tu">&#10007; Unpaid</span>';
    case 'closed':   return '<span class="tag tc">&#128274; Closed</span>';
    default:         return '<span class="tag tu">&#10007; Unpaid</span>';
  }
}

    const b=calc(c);
    const ov=!b.isClosed&&b.rows.slice(-2).filter(r=>r.st==='unpaid'&&b.rp>0).length>=2;

      '<div class="pct-label">'+pct+'% recovered</div>'+

      '<div><div class="ml">Principal</div><div class="mv">'+fmt(c.principal)+'</div></div>'+

function getLumpCalc(){
  const lump=parseFloat(document.getElementById('p_lump').value)||0;
  const month=document.getElementById('p_month').value;
  const c=customers.find(x=>x.id===payId);if(!c||!month)return null;
  const b=calc(c);
  const principalDue=b.rp;
  // Total unpaid interest across ALL months so far (not just the selected month)
  const totalInterestDue=b.ri;
  // Step 1: Principal first
  const pp=Math.min(lump,principalDue);
  const remaining=parseFloat((lump-pp).toFixed(2));
  // Step 2: Remaining goes to TOTAL accumulated interest due (across all unpaid months)
  const ip=Math.min(remaining,totalInterestDue);
  const intStillDue=parseFloat(Math.max(0,totalInterestDue-ip).toFixed(2));
  // Only truly excess money (beyond principal AND all interest due) becomes unallocated
  const unallocated=parseFloat(Math.max(0,remaining-ip).toFixed(2));
  return{lump,pp,ip,interestDue:totalInterestDue,intStillDue,principalDue,unallocated};
}
function updateLumpPreview(){
  const lump=parseFloat(document.getElementById('p_lump').value)||0;
  const box=document.getElementById('lump-preview');
  if(!lump){box.style.display='none';return;}
  const r=getLumpCalc();if(!r){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Payment Breakdown</div>'+
    '<div class="lump-row"><span class="lump-lbl">Total Amount</span><span class="lump-val" style="color:var(--accent)">'+fmt(r.lump)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl">&#8594; Principal Deducted</span><span class="lump-val g">'+fmt(r.pp)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl">&#8594; Interest Paid (all unpaid months)</span><span class="lump-val g">'+fmt(r.ip)+'</span></div>'+
    (r.intStillDue>0?'<div class="lump-row"><span class="lump-lbl">&#9888; Interest Still Due</span><span class="lump-val r">'+fmt(r.intStillDue)+'</span></div>':'<div class="lump-row"><span class="lump-lbl">&#10003; All Interest Settled</span><span class="lump-val g">\u2713</span></div>')+
    (r.unallocated>0?'<div class="lump-row"><span class="lump-lbl">Excess (after P + all I)</span><span class="lump-val y">'+fmt(r.unallocated)+'</span></div>':'')+
    '<div style="margin-top:8px;font-size:10px;color:var(--text3)">Principal remaining after: '+fmt(Math.max(0,r.principalDue-r.pp))+'<br>Interest will auto-spread across oldest unpaid months first.</div>';
}
function updateSplitPreview(){
  const pp=parseFloat(document.getElementById('p_prin').value)||0;
  const ip=parseFloat(document.getElementById('p_int').value)||0;
  const box=document.getElementById('split-preview');
  if(!pp&&!ip){box.style.display='none';return;}
  const month=document.getElementById('p_month').value;
  const c=customers.find(x=>x.id===payId);if(!c){box.style.display='none';return;}
  const b=calc(c);
  const row=b.rows.find(r=>r.mk===month);
  const interestDue=row?row.mi:parseFloat(((b.rp+pp)*c.rate/100).toFixed(2));
  const intStillDue=parseFloat(Math.max(0,interestDue-ip).toFixed(2));
  box.style.display='block';
  box.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Preview</div>'+
    '<div class="lump-row"><span class="lump-lbl">Monthly Interest Due</span><span class="lump-val y">'+fmt(interestDue)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl">Interest Paid</span><span class="lump-val g">'+fmt(ip)+'</span></div>'+
    (intStillDue>0?'<div class="lump-row"><span class="lump-lbl">&#9888; Interest Still Due</span><span class="lump-val r">'+fmt(intStillDue)+'</span></div>':
    (ip>0?'<div class="lump-row"><span class="lump-lbl">&#10003; Interest Fully Paid</span><span class="lump-val g">Settled</span></div>':''));
}

function savePayment(){
  const month=document.getElementById('p_month').value;
  const dt=document.getElementById('p_date').value;
  const rem=document.getElementById('p_rem').value.trim();
  if(!month||!dt){toast('Select month and date','error');return;}
  const c=customers.find(x=>x.id===payId);if(!c)return;

  if(payMode==='lump'){
    const lump=parseFloat(document.getElementById('p_lump').value)||0;
    if(!lump){toast('Enter total amount','error');return;}
    const r=getLumpCalc();
    if(r.pp===0&&r.ip===0){toast('Enter at least one amount','error');return;}

    if(actionEntryId){
      // Editing an existing lump entry — just update it in place (simple case)
      const idx=c.payments.findIndex(p=>p.id===actionEntryId);
      if(idx>=0)c.payments[idx]={...c.payments[idx],month,interestPaid:r.ip,principalPaid:r.pp,paymentDate:dt,remarks:rem};
      actionEntryId=null;
      save();closeM('mPay');renderDetail();toast('\u2705 Payment updated!');
      return;
    }

    // NEW lump payment — distribute principal + interest across actual unpaid months (oldest first)
    const b=calc(c);
    let remainingPP=r.pp;
    let remainingIP=r.ip;
    const unpaidMonths=b.rows.filter(row=>!row.isClosing&&(row.mi-row.ip)>0.009).sort((a,bb)=>a.mk.localeCompare(bb.mk));
    let coveredAny=false;

    // Allocate interest to each unpaid month, oldest first, until exhausted
    for(const row of unpaidMonths){
      if(remainingIP<=0)break;
      const dueThisMonth=parseFloat((row.mi-row.ip).toFixed(2));
      if(dueThisMonth<=0)continue;
      const allocate=Math.min(remainingIP,dueThisMonth);
      c.payments.push({id:genId(),month:row.mk,interestPaid:allocate,principalPaid:0,paymentDate:dt,remarks:rem||'Lump payment (auto-allocated)'});
      remainingIP=parseFloat((remainingIP-allocate).toFixed(2));
      coveredAny=true;
    }
    // Apply principal to the selected month (or current/latest open month)
    if(remainingPP>0){
      c.payments.push({id:genId(),month,interestPaid:0,principalPaid:remainingPP,paymentDate:dt,remarks:rem});
      coveredAny=true;
    }
    // If nothing was unpaid yet (e.g. brand-new loan) but interest was allocated, ensure it lands somewhere
    if(!coveredAny&&remainingIP>0){
      c.payments.push({id:genId(),month,interestPaid:remainingIP,principalPaid:0,paymentDate:dt,remarks:rem});
    }
    save();closeM('mPay');renderDetail();toast('\u2705 Payment saved & allocated across '+(unpaidMonths.filter(rw=>(rw.mi-rw.ip)>0.009).length||1)+' month(s)!');
    return;
  }

  // SPLIT MODE — single month entry as before
  const ip=parseFloat(document.getElementById('p_int').value)||0;
  const pp=parseFloat(document.getElementById('p_prin').value)||0;
  if(ip===0&&pp===0){toast('Enter at least one amount','error');return;}

  if(actionEntryId){
    const idx=c.payments.findIndex(p=>p.id===actionEntryId);
    if(idx>=0)c.payments[idx]={...c.payments[idx],month,interestPaid:ip,principalPaid:pp,paymentDate:dt,remarks:rem};
    actionEntryId=null;
  } else {
    c.payments.push({id:genId(),month,interestPaid:ip,principalPaid:pp,paymentDate:dt,remarks:rem});
  }
  save();closeM('mPay');renderDetail();toast('\u2705 Payment saved!');
}

// ── CLOSE ACCOUNT ──
async function closeAccount(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const b=calc(c);
  if(b.isClosed){toast('\uD83D\uDD12 Already closed','error');return;}
  const msg=(b.rp>0||b.ri>0?
    'Principal Remaining: '+fmt(b.rp)+'\nInterest Remaining: '+fmt(b.ri)+'\n\nThese will be recorded as waived.\nAccount will be FULLY FROZEN — no further edits possible.':
    'All dues cleared.\nAccount will be frozen — no further edits possible.');
  const ok=await customConfirm(msg,'\uD83D\uDD12 Close Account?');
  if(!ok)return;
  const now=new Date();
  const nowDate=now.toISOString().split('T')[0];
  const closeMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  c.payments=(c.payments||[]).filter(p=>!p.isClosing);
  c.payments.push({
    id:'closing_'+c.id,
    month:closeMonth,
    interestPaid:0,
    principalPaid:0,
    paymentDate:nowDate,
    isClosing:true,
    waivedPrincipal:b.rp,
    waivedInterest:b.ri,
    closedAt:now.toISOString()
  });
  c.closedAt=now.toISOString();
  save();
  renderDetail();
  renderDash();
  toast('\uD83D\uDD12 Account closed and frozen!');
}

// ── SUMMARY ──
function renderSummary(){
  const overdue=[],active=[],closed=[];
  customers.forEach(c=>{
    const b=calc(c);
    const isOv=!b.isClosed&&b.rows.slice(-2).filter(r=>r.st==='unpaid'&&b.rp>0).length>=2;
    if(b.isClosed)closed.push({c,b});else if(isOv)overdue.push({c,b});else active.push({c,b});
  });
  const makeRows=arr=>arr.map(({c,b})=>'<div class="sum-row" onclick="openDetail(\''+c.id+'\')">'+
    '<div><div class="sum-name">'+c.name+'</div><div style="font-size:11px;color:var(--text3)">'+fmt(c.principal)+' @ '+c.rate+'%</div></div>'+
    '<div style="text-align:right"><div class="sum-due'+(b.ri===0?' sum-ok':'')+'">'+fmt(b.ri)+'</div>'+
    '<div style="font-size:10px;color:var(--text3)">Left: '+fmt(b.rp)+'</div></div></div>').join('');
  let html='';
  if(overdue.length)html+='<div class="sum-section"><div class="sum-title">&#9888;&#65039; Overdue ('+overdue.length+')</div>'+makeRows(overdue)+'</div>';
  if(active.length)html+='<div class="sum-section"><div class="sum-title">&#9989; Active ('+active.length+')</div>'+makeRows(active)+'</div>';
  if(closed.length)html+='<div class="sum-section"><div class="sum-title">&#128274; Closed ('+closed.length+')</div>'+makeRows(closed)+'</div>';
  document.getElementById('summaryContent').innerHTML=html+'<div style="height:80px"></div>';
}

// ── NAV ──
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('active');
  document.getElementById('scrollArea').scrollTop=0;
  document.getElementById('fabBtn').style.display=name==='detail'?'none':'flex';
  if(name==='dash')renderDash();
  if(name==='summary')renderSummary();
}
function goBack(){showPage(prevPage||'dash');}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.classList.contains('backdrop'))e.target.classList.remove('open');});
function setSS(s,t){document.getElementById('sdot').className='sdot '+(s==='ok'?'ok':s==='busy'?'busy':'err');document.getElementById('stxt').textContent=t;}
let tT;function toast(msg,type='success'){const e=document.getElementById('toast');e.textContent=msg;e.className='toast show '+type;clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),3000);}

init();

// ---------- PWA setup (icon, manifest, service worker) ----------
(function setupPWA(){
  function makeIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const r = size * 0.22;
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#4f8ef7'); grad.addColorStop(1, '#7c6af7');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0); ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r); ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '800 ' + (size * 0.5) + 'px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('₹', size / 2, size * 0.56);
    return canvas.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);
  document.getElementById('faviconLink').href = icon192;
  document.getElementById('appleIconLink').href = icon192;

  const manifest = {
    name: "LoanLedger",
    short_name: "LoanLedger",
    start_url: ".",
    display: "standalone",
    background_color: "#0d1117",
    theme_color: "#0d1117",
    icons: [
      { src: icon192, sizes: "192x192", type: "image/png" },
      { src: icon512, sizes: "512x512", type: "image/png" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  document.getElementById('manifestLink').href = URL.createObjectURL(manifestBlob);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
