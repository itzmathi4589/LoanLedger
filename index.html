<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c14">
<title>LoanLedger</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="LoanLedger">
<meta name="application-name" content="LoanLedger">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c14;--surface:#12151f;--surface2:#1a1e2e;--surface3:#222840;--border:#2a2f4a;--accent:#4f8ef7;--accent2:#7c6af7;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--text:#e8eaf0;--text2:#8b90a7;--text3:#4a506a;--radius:16px;--radius-sm:10px;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:Sora,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:50}
.logo{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.hright{display:flex;gap:8px;align-items:center}
.sync-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.sdot.ok{background:var(--green)}.sdot.busy{background:var(--yellow);animation:pulse 1s infinite}.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{display:none}
.page{display:none}.page.active{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.container{padding:16px;max-width:700px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::before{background:var(--accent)}.stat-card.purple::before{background:var(--accent2)}.stat-card.green::before{background:var(--green)}.stat-card.yellow::before{background:var(--yellow)}
.stat-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:20px;font-weight:700;margin-top:4px;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:15px;font-weight:600}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px 10px 38px;color:var(--text);font-family:Sora,sans-serif;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}.search-wrap input::placeholder{color:var(--text3)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}
.cards-grid{display:flex;flex-direction:column;gap:10px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s,transform .1s}
.ccard:active{transform:scale(.98)}.ccard.overdue{border-color:rgba(245,158,11,.4)}
.ccard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ccard-left{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.cname{font-weight:600;font-size:14px;line-height:1.3}.cphone{font-size:11px;color:var(--text2);margin-top:1px}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-active{background:rgba(34,197,94,.15);color:var(--green)}.b-closed{background:rgba(100,100,120,.15);color:var(--text3)}.b-overdue{background:rgba(245,158,11,.15);color:var(--yellow)}
.pbar{background:var(--surface3);border-radius:4px;height:4px;overflow:hidden;margin:8px 0 4px}
.pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pct-label{font-size:10px;color:var(--text3)}
.cmeta{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ml{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.mv{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:2px}
.mv.r{color:var(--red)}.mv.g{color:var(--green)}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}.empty-title{font-size:14px;font-weight:600;color:var(--text2)}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border:none;background:none;color:var(--text3);font-family:Sora,sans-serif;font-size:10px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--accent)}.nav-icon{font-size:20px;line-height:1}
.fab{position:fixed;bottom:calc(72px + var(--safe-bottom));right:16px;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,142,247,.4);transition:transform .15s,box-shadow .15s;z-index:40}
.fab:active{transform:scale(.92)}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;color:var(--text2);font-size:13px;cursor:pointer;font-family:Sora,sans-serif;display:inline-flex;align-items:center;gap:5px}
.dhead{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.dtop{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.davatar{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.dname{font-size:18px;font-weight:700}.dphone{font-size:13px;color:var(--text2);margin-top:2px}.dnotes{font-size:11px;color:var(--text3);margin-top:4px}
.dactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.dstats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ds{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}
.dsl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.dsv{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:80px}
.twrap-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:550px}
thead tr{background:var(--surface2)}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;white-space:nowrap}
td{padding:9px 12px;font-size:11px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--surface2)}
.tdl{font-family:Sora,sans-serif;color:var(--text2);font-size:11px}
.tag{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;font-family:Sora,sans-serif}
.tp{background:rgba(34,197,94,.15);color:var(--green)}.tt{background:rgba(245,158,11,.15);color:var(--yellow)}.tu{background:rgba(239,68,68,.1);color:var(--red)}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);padding-bottom:var(--safe-bottom)}
.backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}.fl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text);font-family:Sora,sans-serif;font-size:14px;outline:none}
.fi:focus{border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;gap:8px;margin-top:16px}.mact .btn{flex:1}
.btn{padding:11px 16px;border-radius:var(--radius-sm);border:none;font-family:Sora,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.wa-btn{background:#25d366;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Sora,sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.pay-tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-family:Sora,sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .2s}
.pay-tab.active{background:var(--accent);color:#fff}
.lump-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.lump-row:last-child{border-bottom:none}
.lump-lbl{font-size:11px;color:var(--text2)}
.lump-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.lump-val.g{color:var(--green)}.lump-val.r{color:var(--red)}.lump-val.y{color:var(--yellow)}
.loading-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center}
.loading-ov.show{display:flex}
.loading-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 36px;text-align:center}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-weight:500;z-index:500;display:none;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{display:flex}.toast.success{border-color:rgba(34,197,94,.4)}.toast.error{border-color:rgba(239,68,68,.4)}
.sum-section{margin-bottom:20px}.sum-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sum-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer}
.sum-name{font-size:13px;font-weight:600}.sum-due{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--red)}.sum-ok{color:var(--green)}
/* Payment row tap styles */
tbody tr.has-payment{cursor:pointer}
tbody tr.has-payment:active{background:var(--surface3)}
tbody tr.has-payment td:first-child::after{content:" ●";color:var(--accent);font-size:8px;vertical-align:middle}
/* Action sheet */
.asheet-info{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px}
.asheet-month{font-size:16px;font-weight:700;margin-bottom:8px}
.asheet-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.asheet-lbl{color:var(--text2)}.asheet-val{font-family:'JetBrains Mono',monospace;font-weight:600}
.asheet-actions{display:flex;flex-direction:column;gap:8px}
.asheet-btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;font-family:Sora,sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.asheet-btn:active{transform:scale(.98)}
.asheet-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.asheet-delete{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.asheet-cancel{background:none;color:var(--text3);border:1px solid var(--border)}
@media(min-width:600px){
  .cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .backdrop{align-items:center;padding-bottom:0}.modal{border-radius:20px;padding:24px;max-height:80dvh}
  .fab{bottom:calc(80px + var(--safe-bottom));right:24px}
}
</style>
</head>
<body>
<div class="loading-ov" id="ldOv"><div class="loading-box"><div class="spin"></div><div id="ldTxt" style="font-size:13px;color:var(--text2)">Loading...</div></div></div>
<div class="toast" id="toast"></div>
<header class="header">
  <div class="logo"><div class="logo-icon">&#8377;</div>LoanLedger</div>
  <div class="hright"><div class="sync-pill"><div class="sdot ok" id="sdot"></div><span id="stxt">Ready</span></div></div>
</header>
<div class="scroll-area" id="scrollArea">
  <div class="page active" id="page-dash">
    <div class="container">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="sec-head">
        <div class="sec-title">Customers <span class="chip" id="cCount">0</span></div>
        <button class="btn btn-secondary btn-sm" onclick="renderDash()">&#8635; Refresh</button>
      </div>
      <div class="search-wrap">
        <span class="search-ico">&#128269;</span>
        <input type="text" placeholder="Search name or phone..." oninput="renderCards(this.value)" id="searchInput">
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div style="height:80px"></div>
    </div>
  </div>
  <div class="page" id="page-detail">
    <div class="container">
      <div class="back-row"><button class="back-btn" onclick="goBack()">&#8592; Back</button></div>
      <div id="detailContent"></div>
    </div>
  </div>
  <div class="page" id="page-summary">
    <div class="container">
      <div class="sec-head" style="margin-bottom:16px"><div class="sec-title">&#128202; Summary</div></div>
      <div id="summaryContent"></div>
      <div style="height:80px"></div>
    </div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-dash" onclick="showPage('dash')"><span class="nav-icon">&#127968;</span>Home</button>
  <button class="nav-btn" id="nav-summary" onclick="showPage('summary')"><span class="nav-icon">&#128202;</span>Summary</button>
</nav>
<button class="fab" onclick="openAddModal()" id="fabBtn">+</button>

<div class="backdrop" id="mAdd"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">&#10133; Add Customer</div>
  <div class="fg"><label class="fl">Full Name *</label><input class="fi" id="c_name" placeholder="e.g. Ravi Kumar"></div>
  <div class="fg"><label class="fl">Phone</label><input class="fi" id="c_phone" type="tel" placeholder="9876543210"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Principal (&#8377;) *</label><input class="fi" id="c_prin" type="number" placeholder="50000"></div>
    <div class="fg"><label class="fl">Rate (%/month) *</label><input class="fi" id="c_rate" type="number" step="0.01" placeholder="2"></div>
  </div>
  <div class="fg"><label class="fl">Start Date *</label><input class="fi" id="c_date" type="date"></div>
  <div class="fg"><label class="fl">Notes</label><input class="fi" id="c_notes" placeholder="Optional notes"></div>
  <div class="mact">
    <button class="btn btn-secondary" onclick="closeM('mAdd')">Cancel</button>
    <button class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
  </div>
</div></div>

<div class="backdrop" id="mEdit"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">&#9999;&#65039; Edit Customer</div>
  <div class="fg"><label class="fl">Full Name *</label><input class="fi" id="e_name"></div>
  <div class="fg"><label class="fl">Phone</label><input class="fi" id="e_phone" type="tel"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Principal (&#8377;) *</label><input class="fi" id="e_prin" type="number"></div>
    <div class="fg"><label class="fl">Rate (%/month) *</label><input class="fi" id="e_rate" type="number" step="0.01"></div>
  </div>
  <div class="fg"><label class="fl">Start Date *</label><input class="fi" id="e_date" type="date"></div>
  <div class="fg"><label class="fl">Notes</label><input class="fi" id="e_notes"></div>
  <div class="mact">
    <button class="btn btn-danger" onclick="delCustomer()">&#128465; Delete</button>
    <button class="btn btn-secondary" onclick="closeM('mEdit')">Cancel</button>
    <button class="btn btn-primary" onclick="saveEdit()">Save</button>
  </div>
</div></div>

<div class="backdrop" id="mPay"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">&#128179; Record Payment</div>

  <!-- Month + Date (always visible) -->
  <div class="frow">
    <div class="fg"><label class="fl">Payment Month *</label><input class="fi" id="p_month" type="month"></div>
    <div class="fg"><label class="fl">Payment Date</label><input class="fi" id="p_date" type="date"></div>
  </div>

  <!-- Mode Tabs -->
  <div style="display:flex;gap:0;margin-bottom:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px">
    <button class="pay-tab active" id="tab-split" onclick="setPayMode('split')">&#9999;&#65039; Split Entry</button>
    <button class="pay-tab" id="tab-lump" onclick="setPayMode('lump')">&#128176; Lump Sum</button>
  </div>

  <!-- SPLIT MODE -->
  <div id="mode-split">
    <div class="frow">
      <div class="fg"><label class="fl">Principal Paid (&#8377;)</label><input class="fi" id="p_prin" type="number" min="0" placeholder="0" oninput="updateSplitPreview()"></div>
      <div class="fg"><label class="fl">Interest Paid (&#8377;)</label><input class="fi" id="p_int" type="number" min="0" placeholder="0" oninput="updateSplitPreview()"></div>
    </div>
    <!-- Split preview -->
    <div id="split-preview" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;font-size:12px"></div>
  </div>

  <!-- LUMP SUM MODE -->
  <div id="mode-lump" style="display:none">
    <div class="fg">
      <label class="fl">Total Amount Paid (&#8377;) *</label>
      <input class="fi" id="p_lump" type="number" min="0" placeholder="e.g. 12000" oninput="updateLumpPreview()">
    </div>
    <!-- Live preview box -->
    <div id="lump-preview" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px"></div>
  </div>

  <div class="fg"><label class="fl">Remarks</label><input class="fi" id="p_rem" placeholder="e.g. Cash, UPI, Cheque"></div>
  <div class="mact">
    <button class="btn btn-secondary" onclick="closeM('mPay')">Cancel</button>
    <button class="btn btn-primary" onclick="savePayment()">Save Payment</button>
  </div>
</div></div>

<!-- PAYMENT ROW ACTION SHEET -->
<div class="backdrop" id="mPayAction"><div class="modal">
  <div class="modal-handle"></div>

  {id:'c_1772372166944',name:'K.P.Prakash',phone:'',principal:20000,rate:2,startDate:'2020-09-12',notes:'',createdAt:'2026-03-01T13:36:06.944Z',payments:[]},

  {id:'c_1772380184373',name:'Gugan Kumar',phone:'',principal:50000,rate:2,startDate:'2025-12-10',notes:'',createdAt:'2026-03-01T15:49:44.373Z',payments:[]},
  {id:'c_1772380227956',name:'Purushthangan',phone:'',principal:100000,rate:2,startDate:'2026-01-05',notes:'',createdAt:'2026-03-01T15:50:27.956Z',payments:[]}

let customers=[],curId=null,payId=null,prevPage='dash';
function save(){try{localStorage.setItem('ll_data',JSON.stringify(customers));}catch(e){}}
function load(){try{const d=localStorage.getItem('ll_data');if(d){const p=JSON.parse(d);if(p&&p.length>0)return p;}}catch(e){}return null;}
function init(){
  const cached=load();
  if(cached){
    customers=cached;
    let added=0;
    SEED.forEach(sc=>{if(!customers.find(c=>c.id===sc.id)){customers.push(sc);added++;}});
    if(added>0)save();
  } else {
    customers=JSON.parse(JSON.stringify(SEED));save();
  }
  renderDash();setSS('ok','Ready');
}
function calc(c){
  const start=new Date(c.startDate),now=new Date();const rows=[];
  let principal=c.principal,tia=0,tip=0;const pmap={};
  (c.payments||[]).forEach(p=>pmap[p.month]=p);
  let y=start.getFullYear(),m=start.getMonth();
  while(principal>0){
    if(y>now.getFullYear()||(y===now.getFullYear()&&m>now.getMonth()))break;
    const mk=y+'-'+String(m+1).padStart(2,'0');
    const interest=parseFloat((principal*c.rate/100).toFixed(2));tia+=interest;
    const pay=pmap[mk]||{interestPaid:0,principalPaid:0};
    const ip=parseFloat(pay.interestPaid||0),pp=parseFloat(pay.principalPaid||0);
    tip+=ip;const prev=principal;principal=Math.max(0,principal-pp);
    rows.push({mk,label:new Date(y,m).toLocaleString('default',{month:'short',year:'numeric'}),op:prev,mi:interest,ip,pp,cp:principal,st:ip>=interest?'paid':(ip>0?'partial':'unpaid'),dt:pay.paymentDate||'',rem:pay.remarks||''});
    m++;if(m>11){m=0;y++;}
  }
  return{rows,tia:+tia.toFixed(2),tip:+tip.toFixed(2),ri:+Math.max(0,tia-tip).toFixed(2),rp:+principal.toFixed(2),mo:rows.length};
}
function fmt(n){return'\u20B9'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2})}
function fmtD(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—'}
function renderDash(){
  let tp=0,tr=0,td=0,oc=0;
  customers.forEach(c=>{const b=calc(c);tp+=c.principal;tr+=b.rp;td+=b.ri;if(b.rows.slice(-2).filter(r=>r.st==='unpaid'&&b.rp>0).length>=2)oc++;});
  document.getElementById('statsGrid').innerHTML=
    '<div class="stat-card blue"><div class="stat-label">Customers</div><div class="stat-value">'+customers.length+'</div><div class="stat-sub">All accounts</div></div>'+
    '<div class="stat-card purple"><div class="stat-label">Total Lent</div><div class="stat-value" style="font-size:15px">'+fmt(tp)+'</div><div class="stat-sub">Original principal</div></div>'+
    '<div class="stat-card green"><div class="stat-label">Outstanding</div><div class="stat-value" style="font-size:15px">'+fmt(tr)+'</div><div class="stat-sub">Principal left</div></div>'+
    '<div class="stat-card yellow"><div class="stat-label">Interest Due</div><div class="stat-value" style="font-size:15px">'+fmt(td)+'</div><div class="stat-sub">'+oc+' overdue</div></div>';
  document.getElementById('cCount').textContent=customers.length;renderCards();
}
function renderCards(q=''){
  const g=document.getElementById('cardsGrid');
  const f=customers.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||(c.phone||'').includes(q));
  if(!f.length){g.innerHTML='<div class="empty"><div class="empty-icon">&#128100;</div><div class="empty-title">'+(customers.length===0?'No customers yet — tap + to add':'No results found')+'</div></div>';return;}
  g.innerHTML=f.map(c=>{
    const b=calc(c);const ov=b.rows.slice(-2).filter(r=>r.st==='unpaid'&&b.rp>0).length>=2;const cl=b.rp===0;
    const pct=c.principal>0?Math.round(((c.principal-b.rp)/c.principal)*100):100;
    return'<div class="ccard'+(ov?' overdue':'')+'" onclick="openDetail(\''+c.id+'\')">'+
      '<div class="ccard-top"><div class="ccard-left"><div class="avatar">'+c.name[0].toUpperCase()+'</div>'+
      '<div><div class="cname">'+c.name+'</div><div class="cphone">'+(c.phone||'No phone')+'</div></div></div>'+
      '<span class="badge '+(cl?'b-closed':ov?'b-overdue':'b-active')+'">'+(cl?'Closed':ov?'&#9888; Overdue':'Active')+'</span></div>'+
      '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>'+
      '<div class="pct-label">'+pct+'% recovered</div>'+
      '<div class="cmeta">'+
      '<div><div class="ml">Principal</div><div class="mv">'+fmt(c.principal)+'</div></div>'+
      '<div><div class="ml">Rate/mo</div><div class="mv">'+c.rate+'%</div></div>'+
      '<div><div class="ml">Left</div><div class="mv '+(b.rp>0?'r':'g')+'">'+fmt(b.rp)+'</div></div>'+
      '<div><div class="ml">Int Due</div><div class="mv '+(b.ri>0?'r':'g')+'">'+fmt(b.ri)+'</div></div>'+
      '</div></div>';
  }).join('');
}
function openDetail(id){curId=id;prevPage='dash';renderDetail();showPage('detail');}
function renderDetail(){
  const c=customers.find(x=>x.id===curId);if(!c)return;const b=calc(c);
  const wa=c.phone?'<a href="https://wa.me/91'+c.phone+'?text='+encodeURIComponent('Hi '+c.name+', interest due \u20B9'+b.ri+'. Principal left \u20B9'+b.rp+'. Please pay. \u2014 LoanLedger')+'" target="_blank" class="wa-btn">&#128241; WhatsApp</a>':'';
  const rows=b.rows.map((r,i)=>{
    const hasPay=(r.ip>0||r.pp>0);
    const trClass=hasPay?'has-payment':'';
    const trClick=hasPay?'onclick="openPayAction(\''+curId+'\',\''+r.mk+'\')"':'onclick="openPayFromRow(\''+curId+'\',\''+r.mk+'\')"';
    const rowTitle=hasPay?'title="Tap to edit or delete this entry"':'title="Tap to record payment for this month"';
    return'<tr class="'+trClass+'" '+trClick+' '+rowTitle+'><td class="tdl">'+(i+1)+'</td><td class="tdl">'+r.label+'</td><td>'+fmt(r.op)+'</td><td>'+fmt(r.mi)+'</td><td>'+fmt(r.ip)+'</td><td>'+fmt(r.pp)+'</td><td>'+fmt(r.cp)+'</td><td><span class="tag '+(r.st==='paid'?'tp':r.st==='partial'?'tt':'tu')+'">'+(r.st==='paid'?'&#10003; Paid':r.st==='partial'?'~ Partial':'&#10007; Unpaid')+'</span></td><td class="tdl">'+(r.rem||'—')+'</td></tr>';
  }).join('');
  document.getElementById('detailContent').innerHTML=
    '<div class="dhead"><div class="dtop"><div class="davatar">'+c.name[0].toUpperCase()+'</div>'+
    '<div style="flex:1"><div class="dname">'+c.name+'</div><div class="dphone">'+(c.phone||'No phone')+'</div>'+(c.notes?'<div class="dnotes">&#128221; '+c.notes+'</div>':'')+'</div></div>'+
    '<div class="dactions">'+wa+'<button class="btn btn-secondary btn-sm" onclick="openEdit(\''+c.id+'\')">&#9999;&#65039; Edit</button><button class="btn btn-primary btn-sm" onclick="openPay(\''+c.id+'\')">+ Payment</button><button class="btn btn-secondary btn-sm" onclick="doPrint(\''+c.id+'\')">&#128424; Print</button>'+(b.rp>0||b.ri>0?'<button class="btn btn-danger btn-sm" onclick="closeAccount(\''+c.id+'\')">&#128274; Close Account</button>':'')+'</div>'+
    '<div class="dstats" style="margin-top:14px">'+
    '<div class="ds"><div class="dsl">Principal</div><div class="dsv">'+fmt(c.principal)+'</div></div>'+
    '<div class="ds"><div class="dsl">Rate/Month</div><div class="dsv">'+c.rate+'%</div></div>'+
    '<div class="ds"><div class="dsl">Start Date</div><div class="dsv" style="font-size:13px">'+fmtD(c.startDate)+'</div></div>'+
    '<div class="ds"><div class="dsl">Months</div><div class="dsv">'+b.mo+'</div></div>'+
    '<div class="ds"><div class="dsl">Total Interest</div><div class="dsv">'+fmt(b.tia)+'</div></div>'+
    '<div class="ds"><div class="dsl">Int Paid</div><div class="dsv" style="color:var(--green)">'+fmt(b.tip)+'</div></div>'+
    '<div class="ds"><div class="dsl">Int Due</div><div class="dsv" style="color:var(--red)">'+fmt(b.ri)+'</div></div>'+
    '<div class="ds"><div class="dsl">Principal Left</div><div class="dsv" style="color:'+(b.rp>0?'var(--red)':'var(--green)')+'">'+fmt(b.rp)+'</div></div>'+
    '</div></div>'+
    '<div class="twrap"><div class="twrap-head"><div class="sec-title">&#128197; Monthly Breakdown</div></div>'+
    '<div class="table-scroll"><table><thead><tr><th>#</th><th>Month</th><th>Opening</th><th>Interest</th><th>Int Paid</th><th>Prin Paid</th><th>Closing</th><th>Status</th><th>Remarks</th></tr></thead>'+
    '<tbody>'+(rows||'<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:30px">No payments recorded yet</td></tr>')+'</tbody></table></div></div>';
}
function renderSummary(){
  const overdue=[],active=[],closed=[];
  customers.forEach(c=>{
    const b=calc(c);
    const isOv=b.rows.slice(-2).filter(r=>r.st==='unpaid'&&b.rp>0).length>=2;
    const isCl=b.rp===0;
    if(isCl)closed.push({c,b});else if(isOv)overdue.push({c,b});else active.push({c,b});
  });
  const makeRows=arr=>arr.map(({c,b})=>'<div class="sum-row" onclick="openDetail(\''+c.id+'\')"><div><div class="sum-name">'+c.name+'</div><div style="font-size:11px;color:var(--text3)">'+fmt(c.principal)+' @ '+c.rate+'%</div></div><div style="text-align:right"><div class="sum-due'+(b.ri===0?' sum-ok':'')+'">'+fmt(b.ri)+'</div><div style="font-size:10px;color:var(--text3)">Left: '+fmt(b.rp)+'</div></div></div>').join('');
  let html='';
  if(overdue.length)html+='<div class="sum-section"><div class="sum-title">&#9888;&#65039; Overdue ('+overdue.length+')</div>'+makeRows(overdue)+'</div>';
  if(active.length)html+='<div class="sum-section"><div class="sum-title">&#9989; Active ('+active.length+')</div>'+makeRows(active)+'</div>';
  if(closed.length)html+='<div class="sum-section"><div class="sum-title">&#128274; Closed ('+closed.length+')</div>'+makeRows(closed)+'</div>';
  document.getElementById('summaryContent').innerHTML=html+'<div style="height:80px"></div>';
}
function openAddModal(){['c_name','c_phone','c_prin','c_rate','c_notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('c_date').value=new Date().toISOString().split('T')[0];openM('mAdd');}
function addCustomer(){
  const name=document.getElementById('c_name').value.trim();
  const phone=document.getElementById('c_phone').value.trim();
  const prin=parseFloat(document.getElementById('c_prin').value);
  const rate=parseFloat(document.getElementById('c_rate').value);
  const date=document.getElementById('c_date').value;
  const notes=document.getElementById('c_notes').value.trim();
  if(!name||!prin||!rate||!date){toast('\u26A0\uFE0F Fill all required fields','error');return;}
  customers.push({id:'c_'+Date.now(),name,phone,principal:prin,rate,startDate:date,notes,payments:[],createdAt:new Date().toISOString()});
  save();closeM('mAdd');renderDash();toast('\u2705 '+name+' added!');
}
function openEdit(id){const c=customers.find(x=>x.id===id);if(!c)return;curId=id;document.getElementById('e_name').value=c.name;document.getElementById('e_phone').value=c.phone||'';document.getElementById('e_prin').value=c.principal;document.getElementById('e_rate').value=c.rate;document.getElementById('e_date').value=c.startDate;document.getElementById('e_notes').value=c.notes||'';openM('mEdit');}
function saveEdit(){
  const name=document.getElementById('e_name').value.trim();if(!name){toast('Name required','error');return;}
  const idx=customers.findIndex(x=>x.id===curId);
  customers[idx]={...customers[idx],name,phone:document.getElementById('e_phone').value.trim(),principal:parseFloat(document.getElementById('e_prin').value),rate:parseFloat(document.getElementById('e_rate').value),startDate:document.getElementById('e_date').value,notes:document.getElementById('e_notes').value.trim()};
  save();closeM('mEdit');renderDetail();toast('\u2705 Updated!');
}
function delCustomer(){if(!confirm('Delete this customer and all payment history?'))return;customers=customers.filter(x=>x.id!==curId);save();closeM('mEdit');showPage('dash');toast('\uD83D\uDDD1\uFE0F Deleted');}
let payMode='split';
function setPayMode(mode){
  payMode=mode;
  document.getElementById('tab-split').classList.toggle('active',mode==='split');
  document.getElementById('tab-lump').classList.toggle('active',mode==='lump');
  document.getElementById('mode-split').style.display=mode==='split'?'':'none';
  document.getElementById('mode-lump').style.display=mode==='lump'?'':'none';
  if(mode==='lump'){document.getElementById('p_lump').value='';document.getElementById('lump-preview').style.display='none';}
  if(mode==='split'){document.getElementById('p_prin').value='';document.getElementById('p_int').value='';document.getElementById('split-preview').style.display='none';}
}
function openPay(id){
  payId=id;const now=new Date();
  document.getElementById('p_month').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('p_date').value=now.toISOString().split('T')[0];
  document.getElementById('p_rem').value='';
  document.getElementById('p_lump').value='';
  document.getElementById('lump-preview').style.display='none';
  document.getElementById('split-preview').style.display='none';
  document.getElementById('p_prin').value='';
  document.getElementById('p_int').value='';
  setPayMode('split');
  openM('mPay');
}
function getLumpCalc(){
  const lump=parseFloat(document.getElementById('p_lump').value)||0;
  const c=customers.find(x=>x.id===payId);
  if(!c)return null;
  const b=calc(c);
  const principalDue=b.rp; // total remaining principal
  const totalInterestDue=b.ri; // total remaining interest (ALL unpaid months)
  // Step 1: Principal is fully deducted first
  const pp=Math.min(lump,principalDue);
  // Step 2: Remainder goes to interest
  const remaining=parseFloat((lump-pp).toFixed(2));
  const ip=Math.min(remaining,totalInterestDue);
  const intStillDue=parseFloat(Math.max(0,totalInterestDue-ip).toFixed(2));
  const unallocated=parseFloat(Math.max(0,remaining-ip).toFixed(2));
  return{lump,pp,ip,totalInterestDue,intStillDue,principalDue,unallocated,principalLeft:Math.max(0,principalDue-pp)};
}
function updateLumpPreview(){
  const lump=parseFloat(document.getElementById('p_lump').value)||0;
  const box=document.getElementById('lump-preview');
  if(!lump){box.style.display='none';return;}
  const r=getLumpCalc();
  if(!r){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=
    '<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Payment Breakdown</div>'+
    '<div class="lump-row"><span class="lump-lbl">Total Amount Paid</span><span class="lump-val" style="color:var(--accent)">'+fmt(r.lump)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl">&#8594; Principal Deducted</span><span class="lump-val g">'+fmt(r.pp)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl">&#8594; Interest Paid (from balance)</span><span class="lump-val g">'+fmt(r.ip)+'</span></div>'+
    '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'+
    '<div class="lump-row"><span class="lump-lbl" style="font-weight:700">Principal Remaining</span><span class="lump-val '+(r.principalLeft>0?'r':'g')+'">'+fmt(r.principalLeft)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl" style="font-weight:700">Interest Still Due</span><span class="lump-val '+(r.intStillDue>0?'r':'g')+'">'+fmt(r.intStillDue)+'</span></div>'+
    '</div>'+
    (r.unallocated>0?'<div class="lump-row" style="margin-top:6px"><span class="lump-lbl">&#128181; Excess (unallocated)</span><span class="lump-val y">'+fmt(r.unallocated)+'</span></div>':'')+
    (r.intStillDue===0&&r.principalLeft===0?'<div style="margin-top:8px;font-size:11px;color:var(--green);font-weight:600">&#10003; Loan fully settled!</div>':'');
}
function updateSplitPreview(){
  const pp=parseFloat(document.getElementById('p_prin').value)||0;
  const ip=parseFloat(document.getElementById('p_int').value)||0;
  const box=document.getElementById('split-preview');
  if(!pp&&!ip){box.style.display='none';return;}
  const month=document.getElementById('p_month').value;
  const c=customers.find(x=>x.id===payId);
  if(!c){box.style.display='none';return;}
  const b=calc(c);
  const row=b.rows.find(r=>r.mk===month);
  const interestDue=row?row.mi:parseFloat((b.rp*c.rate/100).toFixed(2));
  const intStillDue=parseFloat(Math.max(0,interestDue-ip).toFixed(2));
  box.style.display='block';
  box.innerHTML=
    '<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Preview</div>'+
    '<div class="lump-row"><span class="lump-lbl">Monthly Interest Due</span><span class="lump-val y">'+fmt(interestDue)+'</span></div>'+
    '<div class="lump-row"><span class="lump-lbl">Interest Paid</span><span class="lump-val g">'+fmt(ip)+'</span></div>'+
    (intStillDue>0?'<div class="lump-row"><span class="lump-lbl">&#9888; Interest Still Due</span><span class="lump-val r">'+fmt(intStillDue)+'</span></div>':
    (ip>0?'<div class="lump-row"><span class="lump-lbl">&#10003; Interest Fully Paid</span><span class="lump-val g">Settled</span></div>':''));
}
function savePayment(){
  const month=document.getElementById('p_month').value;
  const dt=document.getElementById('p_date').value;
  const rem=document.getElementById('p_rem').value.trim();
  if(!month){toast('Select a month','error');return;}
  let ip=0,pp=0;
  if(payMode==='lump'){
    const lump=parseFloat(document.getElementById('p_lump').value)||0;
    if(!lump){toast('Enter total amount','error');return;}
    const r=getLumpCalc();
    pp=r.pp;ip=r.ip;
  } else {
    ip=parseFloat(document.getElementById('p_int').value)||0;
    pp=parseFloat(document.getElementById('p_prin').value)||0;
  }
  const c=customers.find(x=>x.id===payId);
  c.payments=(c.payments||[]).filter(p=>p.month!==month);
  c.payments.push({month,interestPaid:ip,principalPaid:pp,paymentDate:dt,remarks:rem});
  save();closeM('mPay');renderDetail();toast('\u2705 Payment saved!');
}
function closeAccount(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const b=calc(c);
  const hasBalance=b.rp>0||b.ri>0;
  const msg=hasBalance
    ?'Close this account with balance remaining?\n\nPrincipal Balance: '+fmt(b.rp)+'\nInterest Balance: '+fmt(b.ri)+'\n\nBalances will be waived and account marked CLOSED.'
    :'All dues paid. Close this account?';
  if(!confirm(msg))return;
  const now=new Date();
  const closeMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  c.closedAt=now.toISOString();
  // Add closing payment that wipes remaining principal and interest
  if(hasBalance){
    c.payments=(c.payments||[]).filter(p=>p.month!==closeMonth);
    c.payments.push({month:closeMonth,interestPaid:b.ri,principalPaid:b.rp,paymentDate:now.toISOString().split('T')[0],remarks:'Account Closed'+(hasBalance?' — Balance Waived: P='+fmt(b.rp)+' I='+fmt(b.ri):'')});
  }
  save();renderDetail();renderDash();toast('\uD83D\uDD12 Account closed!');
}
function doPrint(id){
  const c=customers.find(x=>x.id===id);if(!c)return;const b=calc(c);
  const rows=b.rows.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+r.label+'</td><td>'+fmt(r.op)+'</td><td>'+fmt(r.mi)+'</td><td>'+fmt(r.ip)+'</td><td>'+fmt(r.pp)+'</td><td>'+fmt(r.cp)+'</td><td>'+r.st+'</td><td>'+(r.rem||'')+'</td></tr>').join('');
  const w=window.open('','_blank');
  w.document.write('<html><head><title>'+c.name+'</title><style>body{font-family:sans-serif;padding:20px;font-size:12px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:6px 8px}th{background:#f5f5f5}</style></head><body><h2>'+c.name+' \u2014 Loan Statement</h2><p>Phone:'+(c.phone||'\u2014')+' | Principal:'+fmt(c.principal)+' | Rate:'+c.rate+'%/month | Start:'+fmtD(c.startDate)+'</p><p><b>Principal Left:'+fmt(b.rp)+'</b> | <b>Interest Due:'+fmt(b.ri)+'</b></p><table><thead><tr><th>#</th><th>Month</th><th>Opening</th><th>Interest</th><th>Int Paid</th><th>Prin Paid</th><th>Closing</th><th>Status</th><th>Remarks</th></tr></thead><tbody>'+rows+'</tbody></table></body></html>');
  w.print();
}
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('active');
  document.getElementById('scrollArea').scrollTop=0;
  document.getElementById('fabBtn').style.display=name==='detail'?'none':'flex';
  if(name==='dash')renderDash();
  if(name==='summary')renderSummary();
}
function goBack(){showPage(prevPage||'dash');}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.backdrop').forEach(b=>b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');}));
function setSS(s,t){document.getElementById('sdot').className='sdot '+(s==='ok'?'ok':s==='busy'?'busy':'err');document.getElementById('stxt').textContent=t;}
let tT;
function toast(msg,type='success'){const e=document.getElementById('toast');e.textContent=msg;e.className='toast show '+type;clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),3000);}
let actionPayMonth=null;
function openPayAction(custId,month){
  curId=custId;actionPayMonth=month;
  const c=customers.find(x=>x.id===custId);if(!c)return;
  const b=calc(c);
  const row=b.rows.find(r=>r.mk===month);
  const pay=(c.payments||[]).find(p=>p.month===month);
  if(!row)return;
  const info=document.getElementById('asheet-info');
  info.innerHTML=
    '<div class="asheet-month">'+row.label+'</div>'+
    '<div class="asheet-row"><span class="asheet-lbl">Monthly Interest</span><span class="asheet-val">'+fmt(row.mi)+'</span></div>'+
    '<div class="asheet-row"><span class="asheet-lbl">Interest Paid</span><span class="asheet-val" style="color:var(--green)">'+fmt(row.ip)+'</span></div>'+
    '<div class="asheet-row"><span class="asheet-lbl">Principal Paid</span><span class="asheet-val" style="color:var(--green)">'+fmt(row.pp)+'</span></div>'+
    (pay&&pay.paymentDate?'<div class="asheet-row"><span class="asheet-lbl">Payment Date</span><span class="asheet-val">'+fmtD(pay.paymentDate)+'</span></div>':'')+
    (pay&&pay.remarks?'<div class="asheet-row"><span class="asheet-lbl">Remarks</span><span class="asheet-val" style="font-family:Sora,sans-serif;font-size:11px">'+pay.remarks+'</span></div>':'')+
    '<div class="asheet-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)"><span class="asheet-lbl">Status</span><span class="asheet-val" style="color:'+(row.st==='paid'?'var(--green)':row.st==='partial'?'var(--yellow)':'var(--red)')+'">'+( row.st==='paid'?'✓ Paid':row.st==='partial'?'~ Partial':'✗ Unpaid')+'</span></div>';
  openM('mPayAction');
}
function openPayFromRow(custId,month){
  // Tap on an unpaid row — open payment modal pre-filled for that month
  payId=custId;
  const now=new Date();
  document.getElementById('p_month').value=month;
  document.getElementById('p_date').value=now.toISOString().split('T')[0];
  document.getElementById('p_rem').value='';
  document.getElementById('p_lump').value='';
  document.getElementById('lump-preview').style.display='none';
  document.getElementById('split-preview').style.display='none';
  document.getElementById('p_prin').value='';
  const c=customers.find(x=>x.id===custId);
  if(c){const b=calc(c);const row=b.rows.find(r=>r.mk===month);if(row)document.getElementById('p_int').value=row.mi;}
  setPayMode('split');
  openM('mPay');
}
function editPaymentRow(){
  closeM('mPayAction');
  // Pre-fill payment modal with existing data for this month
  const c=customers.find(x=>x.id===curId);if(!c)return;
  const pay=(c.payments||[]).find(p=>p.month===actionPayMonth);
  payId=curId;
  document.getElementById('p_month').value=actionPayMonth;
  document.getElementById('p_date').value=(pay&&pay.paymentDate)||new Date().toISOString().split('T')[0];
  document.getElementById('p_rem').value=(pay&&pay.remarks)||'';
  document.getElementById('p_lump').value='';
  document.getElementById('lump-preview').style.display='none';
  document.getElementById('split-preview').style.display='none';
  document.getElementById('p_prin').value=(pay&&pay.principalPaid)||0;
  document.getElementById('p_int').value=(pay&&pay.interestPaid)||0;
  setPayMode('split');
  updateSplitPreview();
  openM('mPay');
}
function deletePaymentRow(){
  const c=customers.find(x=>x.id===curId);if(!c)return;
  const b=calc(c);
  const row=b.rows.find(r=>r.mk===actionPayMonth);
  const label=row?row.label:actionPayMonth;
  if(!confirm('Delete payment entry for '+label+'?\n\nThis will mark the month as Unpaid.'))return;
  c.payments=(c.payments||[]).filter(p=>p.month!==actionPayMonth);
  save();closeM('mPayAction');renderDetail();toast('🗑️ Entry deleted');
}
init();
</script>
</body>
